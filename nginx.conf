server {
    listen      80;
    server_name localhost;
    root        /usr/share/nginx/html;
    index       index.html;

    # Compression gzip
    gzip on;
    gzip_types text/css application/javascript text/html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache des assets statiques
    location ~* \.(css|js|png|ico)$ {
        expires 7d;
    }
}