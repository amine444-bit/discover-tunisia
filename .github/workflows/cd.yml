name: CD — Déploiement sur GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  build:
    name: 🔨 Préparation du build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🔧 Injecter les métadonnées de build
        run: |
          BUILD_NUMBER="${{ github.run_number }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          printf "window.ENV = 'production';\nwindow.BUILD = 'build #%s (%s)';\n" "$BUILD_NUMBER" "$SHORT_SHA" > env.js
          echo "✅ env.js généré"
          cat env.js

      - name: 🔗 Lier env.js dans index.html
        run: |
          sed -i 's|<script src="js/|<script src="env.js"></script>\n  <script src="js/|' index.html
          echo "✅ env.js ajouté dans index.html"

      - name: ⚙️ Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📦 Créer l'artifact de déploiement
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    name: 🚀 Déploiement
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🌐 Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 🔗 URL du site
        run: |
          echo "✅ Site déployé !"
          echo "🌐 URL : ${{ steps.deployment.outputs.page_url }}"