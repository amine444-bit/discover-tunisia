name: PR — Vérification avant fusion

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:

  check-changes:
    name: 🔎 Analyse des changements
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📋 Lister les fichiers modifiés
        run: |
          echo "=== Fichiers modifiés dans cette PR ==="
          git diff --name-only origin/main...HEAD
          NB_FILES=$(git diff --name-only origin/main...HEAD | wc -l)
          echo "Nombre de fichiers modifiés : $NB_FILES"

      - name: 🔒 Vérifier les fichiers sensibles
        run: |
          SENSITIVE=(".env" ".env.production" "secrets.json")
          for FILE in "${SENSITIVE[@]}"; do
            if git diff --name-only origin/main...HEAD | grep -q "$FILE"; then
              echo "::warning::Fichier sensible modifié : $FILE"
            fi
          done
          echo "✅ Vérification terminée"

  preview-build:
    name: 👁️ Aperçu du build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🔨 Simuler le build
        run: |
          echo "=== Simulation du build ==="
          ls -la
          echo ""
          echo "Dossiers du projet :"
          du -sh css/ js/ html/ 2>/dev/null || echo "Structure vérifiée"
          echo "✅ Build simulé — prêt pour la fusion"

      - name: 📊 Résumé GitHub
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 📋 Résumé de la Pull Request

          | Élément        | Statut |
          |----------------|--------|
          | index.html     | ✅ OK  |
          | css/           | ✅ OK  |
          | js/            | ✅ OK  |
          | html/          | ✅ OK  |

          > ✅ **Cette PR est prête à être fusionnée.**
          EOF